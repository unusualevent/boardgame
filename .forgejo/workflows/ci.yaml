name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: docker
    container:
      image: golang:1.25
    steps:
      - uses: actions/checkout@v4

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race ./...

      - name: Fuzz
        run: go test -fuzz=. -fuzztime=30s ./...

      - name: Benchmark
        run: go test -bench=. -benchmem -count=5 ./... | tee bench.txt

      - name: Benchstat
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          benchstat bench.txt
